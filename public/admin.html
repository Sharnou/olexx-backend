<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OLEXX Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; margin: 20px; }
    input, button { margin: 4px 0; padding: 8px; width: 100%; max-width: 520px; }
    .row { max-width: 540px; margin-bottom: 16px; }
    pre { background: #f6f8fa; padding: 10px; border-radius: 6px; overflow: auto; }
  </style>
  <script src="/client-api.js"></script>
  <script>
    let api;
    function setEmail() {
      const email = document.getElementById("adminEmail").value.trim();
      api = new OlexxClient(location.origin, email);
      document.getElementById("meOut").textContent = "Admin context set for: " + email;
    }
    async function me() {
      const out = await api.adminMe();
      document.getElementById("meOut").textContent = JSON.stringify(out, null, 2);
    }
    async function status() {
      const sellerId = document.getElementById("sellerId").value.trim();
      const out = await api.adminStatus(sellerId);
      document.getElementById("statusOut").textContent = JSON.stringify(out, null, 2);
    }
    async function mute(val) {
      const sellerId = document.getElementById("sellerId").value.trim();
      const out = await api.adminMute(sellerId, val);
      document.getElementById("statusOut").textContent = JSON.stringify(out, null, 2);
    }
    async function block(val) {
      const sellerId = document.getElementById("sellerId").value.trim();
      const out = await api.adminBlock(sellerId, val);
      document.getElementById("statusOut").textContent = JSON.stringify(out, null, 2);
    }
    async function audit() {
      const sellerId = document.getElementById("sellerId").value.trim();
      const out = await api.adminAudit(sellerId, 100);
      document.getElementById("auditOut").textContent = JSON.stringify(out, null, 2);
    }
    window.addEventListener("DOMContentLoaded", () => {
      api = new OlexxClient(location.origin, "ahmed_sharnou@yahoo.com");
    });
  </script>
  </head>
<body>
  <h1>OLEXX Admin</h1>
  <div class="row">
    <h3>Admin Context</h3>
    <input id="adminEmail" value="ahmed_sharnou@yahoo.com" />
    <button onclick="setEmail()">Use Email</button>
    <button onclick="me()">Check Admin</button>
    <pre id="meOut"></pre>
  </div>
  <div class="row">
    <h3>Seller Moderation</h3>
    <input id="sellerId" placeholder="seller id" />
    <button onclick="status()">Status</button>
    <button onclick="mute(true)">Mute</button>
    <button onclick="mute(false)">Unmute</button>
    <button onclick="block(true)">Block</button>
    <button onclick="block(false)">Unblock</button>
    <pre id="statusOut"></pre>
  </div>
  <div class="row">
    <h3>Audit Log</h3>
    <button onclick="audit()">Load Audit</button>
    <pre id="auditOut"></pre>
  </div>
</body>
</html>
